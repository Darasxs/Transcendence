services:
  frontend:
    build: srcs/frontend
    env_file:
      - .env
    volumes:
      - shared-data:/shared

  backend:
    build: srcs/backend
    env_file:
      - .env
    ports:
      - "${BACKEND_HOST_PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build: srcs/nginx
    env_file:
      - .env
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - shared-data:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend

volumes:
  shared-data:
  postgres-data: